<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Evento Speciale</title>
    <style>
        /* CSS Integrato per semplicità */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .data { font-weight: bold; color: #e74c3c; font-size: 1.2rem; }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Festa di Compleanno!</h1>
        <p class="data">Sabato 27 Giugno 2026 - ore 20:00</p>
        <hr>
        <p>Vi aspetto per festeggiare insieme! La serata prevederà cena e musica all'aperto.</p>
        <p><strong>Location:</strong> Via Roma 15, Milano</p>
        
        <!-- Pulsante che apre direttamente Google Maps -->
        <a href="https://maps.google.com/?q=Via+Roma+15+Milano" target="_blank" class="btn">Apri Navigatore 📍</a>
    </div>

</body>
</html>
