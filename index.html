<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Evento Speciale</title>
    <style>
        /* CSS Integrato per semplicità */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .data { font-weight: bold; color: #e74c3c; font-size: 1.2rem; }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Angelo & Alessia</h1>
        <p class="data">Sabato 2 Ottobre 2027 - ore 16:00</p>
        <hr>
        <p>Chiesa di San Luca, Reggio Calabria.</p>
        <p><strong>Location:</strong> Via Sbarre Inferiori, 2, 89129 Reggio Calabria RC</p>
        
        <!-- Pulsante che apre direttamente Google Maps -->
        <a href="https://www.google.com/maps/place/Chiesa+Parrocchiale+di+San+Luca+Evangelista/@38.0841468,15.6361733,1178m/data=!3m2!1e3!4b1!4m6!3m5!1s0x13145a8bd2cd0957:0xe4220ea7cbdcff8f!8m2!3d38.0841426!4d15.6387482!16s%2Fg%2F1wjwxr6p?entry=ttu&g_ep=EgoyMDI2MDYxMC4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn">Apri Navigatore 📍</a>
    </div>

</body>
</html>
